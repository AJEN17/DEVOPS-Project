apiVersion: v1
kind: Service
metadata:
  name: neuro-backend-svc
spec:
  type: LoadBalancer
  selector:
    app: neuro-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: neuro-frontend-svc
spec:
  type: LoadBalancer
  selector:
    app: neuro-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
