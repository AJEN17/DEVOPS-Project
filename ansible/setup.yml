---
- name: Setup NeuroBalance DevOps Server
  hosts: all
  become: yes

  tasks:

    # -------------------- CRITICAL CLEANUP FIRST --------------------
    - name: Remove old Jenkins repo and keys
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/jenkins.list
        - /etc/apt/trusted.gpg.d/jenkins.gpg
        - /usr/share/keyrings/jenkins-keyring.gpg
        - /usr/share/keyrings/jenkins-keyring.asc

    # -------------------- SWAP --------------------
    - name: Create 4GB Swap File
      command: fallocate -l 4G /swapfile
      args:
        creates: /swapfile

    - name: Set swap file permissions
      file:
        path: /swapfile
        mode: '0600'

    - name: Make swap
      command: mkswap /swapfile
      when: ansible_facts['swaptotal_mb'] | int == 0

    - name: Enable swap
      command: swapon /swapfile
      when: ansible_facts['swaptotal_mb'] | int == 0

    - name: Persist swap in /etc/fstab
      lineinfile:
        path: /etc/fstab
        line: "/swapfile none swap sw 0 0"
        state: present

    - name: Reduce swappiness (helps small RAM)
      sysctl:
        name: vm.swappiness
        value: "10"
        state: present
        reload: yes

    # -------------------- BASE PACKAGES --------------------
    - name: Install base dependencies
      apt:
        name:
          - git
          - curl
          - ca-certificates
          - gnupg
          - apt-transport-https
        state: present
        update_cache: yes

    - name: Install Java 21 for Jenkins
      block:
        - name: Install OpenJDK 21 JRE
          apt:
            name: openjdk-21-jre
            state: present
      rescue:
        - name: Install OpenJDK 21 JRE (headless fallback)
          apt:
            name: openjdk-21-jre-headless
            state: present

    # -------------------- DOCKER --------------------
    - name: Install Docker
      shell: curl -fsSL https://get.docker.com | sh
      args:
        creates: /usr/bin/docker

    - name: Ensure Docker is running
      service:
        name: docker
        state: started
        enabled: yes

    # -------------------- JENKINS (BYPASS: trusted=yes) --------------------
    # Project override: bypass signature checks to avoid NO_PUBKEY/mirror issues.
    - name: Add Jenkins repo (trusted=yes bypass)
      shell: echo "deb [trusted=yes] https://pkg.jenkins.io/debian-stable binary/" | tee /etc/apt/sources.list.d/jenkins.list > /dev/null
      args:
        executable: /bin/bash

    # UPDATE
    - name: Update apt cache
      apt:
        update_cache: yes

    # INSTALL
    - name: Install Jenkins
      apt:
        name: jenkins
        state: present

    - name: Reset systemd crash counter for Jenkins
      command: systemctl reset-failed jenkins.service
      changed_when: false

    - name: Ensure Jenkins is running
      service:
        name: jenkins
        state: started
        enabled: yes

    # -------------------- KUBERNETES TOOLS (LIGHTWEIGHT) --------------------
    - name: Get kubectl stable version
      shell: curl -fsSL https://dl.k8s.io/release/stable.txt
      register: kubectl_stable
      changed_when: false

    - name: Install kubectl
      get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_stable.stdout }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: "0755"

    - name: Install k3s (lightweight Kubernetes)
      shell: curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable traefik" sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Create kubeconfig dir for ubuntu
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0700"
      ignore_errors: true

    - name: Copy k3s kubeconfig for ubuntu
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /home/ubuntu/.kube/config
        remote_src: yes
        owner: ubuntu
        group: ubuntu
        mode: "0600"
      ignore_errors: true

    # -------------------- DOCKER PERMISSIONS --------------------
    - name: Add users to Docker group
      user:
        name: "{{ item }}"
        groups: docker
        append: yes
      loop:
        - ubuntu
        - jenkins
